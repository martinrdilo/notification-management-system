# Test profile configuration
# Datasource properties are overridden dynamically by Testcontainers
# via @DynamicPropertySource in AbstractIntegrationTest

spring:
  datasource:
    # url, username, password are overridden by @DynamicPropertySource
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

# External API base-url: overridden dynamically by WireMock
# via @DynamicPropertySource in AbstractIntegrationTest
external:
  api:
    jsonplaceholder:
      base-url: http://localhost:0

jwt:
  secret: dGVzdHNlY3JldGtleWZvcnRlc3Rpbmd3aXRoZW5vdWdoYnl0ZXM=
  expiration-ms: 86400000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
